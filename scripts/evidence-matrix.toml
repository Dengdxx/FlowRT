# FlowRT generated/runtime/CLI 证据矩阵事实源。
#
# `golden + syntax_compile` 表示对应 golden case 既有 snapshot 证据，也必须进入
# `scripts/test-codegen-compile.sh` 真编译网。`cpp_static_quality = true` 表示该 C++ case
# 作为 generated shell 静态质量代表样本进入 `scripts/test-cpp-static-quality.sh`。

[[case]]
name = "island_cpp_onmsg"
languages = ["cpp"]
surfaces = ["dataflow", "selfdesc"]
backends = ["inproc"]
abi = ["fixed_plain"]
evidence = ["golden", "syntax_compile", "static_quality"]
required_by_release = "0.27.1"
cpp_static_quality = true

