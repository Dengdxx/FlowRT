[package]
name = "flowrt"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[features]
default = []
iox2 = ["dep:iceoryx2"]
zenoh = ["dep:zenoh"]

[dependencies]
iceoryx2 = { version = "0.9", optional = true }
serde.workspace = true
serde_json.workspace = true
zenoh = { version = "1.9", default-features = false, features = ["transport_tcp"], optional = true }
