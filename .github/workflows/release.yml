name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 查找同 commit SHA release evidence
        id: evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          target_sha="$(git rev-parse HEAD)"
          printf 'target_sha=%s\n' "$target_sha" >> "$GITHUB_OUTPUT"

          mapfile -t run_ids < <(
            gh api \
              "/repos/${GITHUB_REPOSITORY}/actions/runs?event=push&head_sha=${target_sha}&status=success&per_page=100" \
              --jq '.workflow_runs[] | select(.path == ".github/workflows/release-candidate.yml") | .id'
          )

          for run_id in "${run_ids[@]}"; do
            job_url="$(
              gh api \
                "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
                --paginate \
                --jq '.jobs[] | select(.name == "Release Evidence Gate" and .conclusion == "success") | .html_url' |
                sed -n '1p'
            )"
            if [[ -n "$job_url" ]]; then
              printf 'found successful release evidence for sha=%s: %s\n' "$target_sha" "$job_url"
              {
                printf 'run_id=%s\n' "$run_id"
                printf 'job_url=%s\n' "$job_url"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          printf 'missing successful release evidence for tag %s at sha %s\n' \
            "$GITHUB_REF_NAME" "$target_sha" >&2
          printf 'push the release branch and wait for Release Evidence Gate before pushing the tag.\n' >&2
          exit 1

      - name: 下载发布产物
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          run_id="${{ steps.evidence.outputs.run_id }}"
          mkdir -p dist
          gh run download "$run_id" -n flowrt-linux-amd64-deb -D dist
          gh run download "$run_id" -n flowrt-linux-arm64-deb -D dist
          gh run download "$run_id" -n flowrt-release-evidence -D dist

      - name: 校验发布产物
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          target_sha="${{ steps.evidence.outputs.target_sha }}"
          source_run_id="${{ steps.evidence.outputs.run_id }}"

          if [[ ! -f dist/release-evidence.json ]]; then
            printf 'release evidence artifact missing release-evidence.json\n' >&2
            exit 1
          fi
          if [[ "$(jq -r '.version' dist/release-evidence.json)" != "$version" ]]; then
            printf 'release evidence version does not match tag %s\n' "$tag" >&2
            exit 1
          fi
          if [[ "$(jq -r '.tag' dist/release-evidence.json)" != "$tag" ]]; then
            printf 'release evidence tag does not match %s\n' "$tag" >&2
            exit 1
          fi
          if [[ "$(jq -r '.sha' dist/release-evidence.json)" != "$target_sha" ]]; then
            printf 'release evidence sha does not match %s\n' "$target_sha" >&2
            exit 1
          fi
          if [[ "$(jq -r '.run_id' dist/release-evidence.json)" != "$source_run_id" ]]; then
            printf 'release evidence run_id does not match source run %s\n' "$source_run_id" >&2
            exit 1
          fi

          mapfile -t debs < <(find dist -maxdepth 1 -type f -name 'flowrt_*_*.deb' | sort)
          if [[ "${#debs[@]}" -ne 2 ]]; then
            printf 'release expected 2 deb artifacts, found %s\n' "${#debs[@]}" >&2
            printf '%s\n' "${debs[@]}" >&2
            exit 1
          fi

          found_amd64=0
          found_arm64=0
          for deb in "${debs[@]}"; do
            deb_version="$(dpkg-deb -f "$deb" Version)"
            deb_arch="$(dpkg-deb -f "$deb" Architecture)"
            if [[ "$deb_version" != "$version" ]]; then
              printf '%s version %s does not match expected %s\n' "$deb" "$deb_version" "$version" >&2
              exit 1
            fi
            case "$deb_arch" in
              amd64) found_amd64=1 ;;
              arm64) found_arm64=1 ;;
              *)
                printf '%s has unexpected architecture %s\n' "$deb" "$deb_arch" >&2
                exit 1
                ;;
            esac
          done

          if [[ "$found_amd64" -ne 1 || "$found_arm64" -ne 1 ]]; then
            printf 'release artifacts must include amd64 and arm64 deb packages\n' >&2
            exit 1
          fi

          if [[ ! -s dist/release-notes.md ]]; then
            printf 'release notes for %s are empty\n' "$tag" >&2
            exit 1
          fi
          if [[ ! -s dist/SHA256SUMS ]]; then
            printf 'SHA256SUMS is empty\n' >&2
            exit 1
          fi
          (cd dist && sha256sum -c SHA256SUMS)

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/flowrt_*_*.deb
            dist/SHA256SUMS
          fail_on_unmatched_files: true
