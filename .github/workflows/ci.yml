name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FLOWRT_DEPS_PREFIX: ${{ github.workspace }}/.flowrt-deps/prefix
  CMAKE_PREFIX_PATH: ${{ github.workspace }}/.flowrt-deps/prefix
  LD_LIBRARY_PATH: ${{ github.workspace }}/.flowrt-deps/prefix/lib

jobs:
  ci:
    name: Linux CI
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/project-layout.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

      - name: 安装系统构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 确认工具链版本
        run: |
          rustc --version
          cargo --version
          cmake --version
          ninja --version
          g++ --version

      - name: 安装 zenoh C++ backend 依赖
        shell: bash
        run: |
          set -euo pipefail

          cargo install cbindgen --locked
          mkdir -p .flowrt-deps/src "$FLOWRT_DEPS_PREFIX"

          git clone --branch 1.9.0 --depth 1 https://github.com/eclipse-zenoh/zenoh-c.git .flowrt-deps/src/zenoh-c
          cmake -S .flowrt-deps/src/zenoh-c -B .flowrt-deps/build/zenoh-c -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$FLOWRT_DEPS_PREFIX" \
            -DBUILD_SHARED_LIBS=ON
          cmake --build .flowrt-deps/build/zenoh-c --target install

          git clone --branch 1.9.0 --depth 1 https://github.com/eclipse-zenoh/zenoh-cpp.git .flowrt-deps/src/zenoh-cpp
          cmake -S .flowrt-deps/src/zenoh-cpp -B .flowrt-deps/build/zenoh-cpp -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$FLOWRT_DEPS_PREFIX" \
            -DCMAKE_PREFIX_PATH="$FLOWRT_DEPS_PREFIX" \
            -DZENOHCXX_ZENOHC=ON \
            -DZENOHCXX_ZENOHPICO=OFF \
            -DZENOHCXX_ENABLE_TESTS=OFF \
            -DZENOHCXX_ENABLE_EXAMPLES=OFF
          cmake --build .flowrt-deps/build/zenoh-cpp --target install

      - name: Rust 格式检查
        run: cargo fmt --check

      - name: Rust 测试
        run: cargo test

      - name: Rust Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: C++ runtime 配置
        run: cmake -S runtime/cpp -B build/cpp -G Ninja

      - name: C++ runtime 构建
        run: cmake --build build/cpp

      - name: C++ runtime 测试
        run: ctest --test-dir build/cpp --output-on-failure

      - name: C++ runtime zenoh 测试
        run: |
          cmake -S runtime/cpp -B build/cpp-zenoh -G Ninja -DFLOWRT_CPP_ENABLE_ZENOH_TESTS=ON
          cmake --build build/cpp-zenoh
          ctest --test-dir build/cpp-zenoh --output-on-failure

      - name: FlowRT demo smoke
        run: |
          cargo run -p flowrt-cli -- build --launcher examples/cpp_counter_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run --run-ticks 5 examples/cpp_counter_demo/rsdl/robot.rsdl --process control
          cargo run -p flowrt-cli -- launch --run-ticks 5 examples/cpp_counter_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- build examples/imu_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- build --launcher examples/import_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run --run-ticks 5 examples/import_demo/rsdl/robot.rsdl --process main
          cargo run -p flowrt-cli -- launch --run-ticks 5 examples/import_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/mixed_iox2_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/imu_demo_iox2/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/profile_switch_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- build --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run --run-ticks 5 --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- build --launcher examples/variable_iox2_demo/rsdl/robot.rsdl
          rm -f /tmp/flowrt-variable-iox2-saw-packet
          FLOWRT_TICK_SLEEP_MS=5 FLOWRT_VARIABLE_IOX2_SAW_PACKET_PATH=/tmp/flowrt-variable-iox2-saw-packet \
            cargo run -p flowrt-cli -- launch --run-ticks 200 examples/variable_iox2_demo/rsdl/robot.rsdl
          test -s /tmp/flowrt-variable-iox2-saw-packet
          cargo run -p flowrt-cli -- build --launcher examples/mixed_zenoh_demo/rsdl/robot.rsdl
          FLOWRT_TICK_SLEEP_MS=5 cargo run -p flowrt-cli -- launch --run-ticks 200 examples/mixed_zenoh_demo/rsdl/robot.rsdl

      - name: 构建 release 版 flowrt
        run: cargo build --release -p flowrt-cli

      - name: 上传 flowrt Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowrt-linux-x86_64
          path: target/release/flowrt
          if-no-files-found: error
