name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  guard-generated:
    name: Guard Generated Files
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git -c safe.directory="$GITHUB_WORKSPACE" ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

  rust-fmt:
    name: Rust Fmt
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust 格式检查
        run: cargo fmt --check

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-ci
          shared-key: rust-test
          cache-on-failure: true

      - name: Rust 测试
        run: cargo test --workspace -j1

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-ci
          shared-key: rust-clippy
          cache-on-failure: true

      - name: Rust Clippy
        run: cargo clippy --workspace --all-targets --all-features -j1 -- -D warnings

  cpp-runtime:
    name: C++ Runtime
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++

      - name: C++ runtime 配置
        run: cmake -S runtime/cpp -B build/cpp -G Ninja

      - name: C++ runtime 构建
        run: cmake --build build/cpp -j1

      - name: C++ runtime 测试
        run: ctest --test-dir build/cpp --output-on-failure

  codegen-compile-net:
    name: Codegen 编译网
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: codegen 编译网
        shell: bash
        run: |
          set -euo pipefail

          focused_smoke="$(cargo run -p flowrt-devtools -- release-gate focused-smoke 0.18.1)"
          bash -n "$focused_smoke"
          "$focused_smoke"
