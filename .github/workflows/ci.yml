name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  guard-generated:
    name: Guard Generated Files
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git -c safe.directory="$GITHUB_WORKSPACE" ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/project-layout.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

  rust-fmt:
    name: Rust Fmt (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Rust 格式检查
        run: cargo fmt --check

  rust-test:
    name: Rust Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Rust 测试
        run: cargo test --workspace -j1

  rust-clippy:
    name: Rust Clippy (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Rust Clippy
        run: cargo clippy --workspace --all-targets --all-features -j1 -- -D warnings

  cpp-runtime:
    name: C++ Runtime (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++

      - name: 确认工具链版本
        run: |
          cmake --version
          ninja --version
          g++ --version

      - name: C++ runtime 配置
        run: cmake -S runtime/cpp -B build/cpp -G Ninja

      - name: C++ runtime 构建
        run: cmake --build build/cpp -j1

      - name: C++ runtime 测试
        run: ctest --test-dir build/cpp --output-on-failure

  v050-runtime-smoke:
    name: v0.5.0 Runtime Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Supervisor readiness 和资源提示测试
        run: |
          cargo test -p flowrt-cli build_runtime_tests -j1
          cargo test -p flowrt-codegen launch -j1
          cargo test -p flowrt supervisor -j1

      - name: 远程参数和 status/hz 测试
        run: |
          cargo test -p flowrt-cli command_tests -j1
          cargo test -p flowrt-cli echo_params_tests -j1
          cargo test -p flowrt-cli selfdesc_status_hz_tests -j1
          cargo test -p flowrt-codegen params -j1
          cargo test -p flowrt introspection -j1

      - name: Scheduler health 测试
        run: |
          cargo test -p flowrt-codegen tasks -j1
          cargo test -p flowrt executor -j1

  v060-runtime-smoke:
    name: v0.6.0 Runtime Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Operation RSDL/IR/validator/codegen 测试
        run: |
          cargo test -p flowrt-rsdl operation -j1
          cargo test -p flowrt-ir operation -j1
          cargo test -p flowrt-validate operation -j1
          cargo test -p flowrt-codegen operation -j1

      - name: Operation runtime/CLI/status 测试
        run: |
          cargo test -p flowrt operation -j1
          cargo test -p flowrt-cli operation -j1
          cargo test -p flowrt-cli selfdesc_status_hz_tests -j1

      - name: Record format/runtime/CLI 测试
        run: |
          cargo test -p flowrt-record -j1
          cargo test -p flowrt-cli record -j1
          cargo test -p flowrt introspection -j1

  v070-runtime-smoke:
    name: v0.7.0 External/Deploy Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: external RSDL/IR/validator/codegen 测试
        run: |
          cargo test -p flowrt-rsdl external_process -j1
          cargo test -p flowrt-ir external_ -j1
          cargo test -p flowrt-validate external_ -j1
          cargo test -p flowrt-codegen external_process -j1

      - name: external supervisor 和 bundle/deploy 测试
        run: |
          cargo test -p flowrt --lib external_ -j1
          cargo test -p flowrt-cli bundle -j1
          cargo test -p flowrt-cli deploy -j1

  v080-runtime-smoke:
    name: v0.8.0 Integration Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: v0.8.0 RSDL/IR/validator 测试
        run: |
          cargo test -p flowrt-rsdl io_boundary -j1
          cargo test -p flowrt-rsdl ros2 -j1
          cargo test -p flowrt-ir frame_descriptor -j1
          cargo test -p flowrt-ir ros2 -j1
          cargo test -p flowrt-validate io_boundary -j1
          cargo test -p flowrt-validate ros2 -j1

      - name: v0.8.0 codegen 测试
        run: |
          cargo test -p flowrt-codegen message -j1
          cargo test -p flowrt-codegen launch -j1
          cargo test -p flowrt-codegen frame_descriptor -j1
          cargo test -p flowrt-codegen ros2_bridge -j1
          cargo test -p flowrt-codegen introspection -j1

      - name: v0.8.0 runtime/CLI/record 测试
        run: |
          cargo test -p flowrt frame_descriptor -j1
          cargo test -p flowrt introspection -j1
          cargo test -p flowrt-record descriptor -j1
          cargo test -p flowrt-cli bundle -j1
          cargo test -p flowrt-cli deploy -j1
          cargo test -p flowrt-cli selfdesc_status_hz_tests -j1

  v081-runtime-smoke:
    name: v0.8.1 FrameDescriptor Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: v0.8.1 FrameDescriptor codegen/CLI/record 测试
        run: |
          cargo test -p flowrt-codegen frame_descriptor_demo_example_codegen_smoke -j1
          cargo test -p flowrt-cli echo_formats_standard_frame_descriptor_payload_structurally -j1
          cargo test -p flowrt-cli live_status_summary_enriches_io_boundary_resource_descriptor_schema -j1
          cargo test -p flowrt-cli record_writes_mcap_from_fake_runtime -j1

      - name: v0.8.1 FrameDescriptor microbench
        run: |
          FLOWRT_BENCH_ITERS=8 FLOWRT_BENCH_PAYLOAD_BYTES=1024 scripts/bench-frame-descriptor.sh

  v090-island-smoke:
    name: v0.9.0 Island Demo Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: 缓存 FlowRT island deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache/v090-island-${{ matrix.arch }}
          key: flowrt-v090-island-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/test-v090-island-demo.sh', 'examples/island_demo/**') }}

      - name: v0.9.0 island demo smoke
        run: |
          export CARGO_BUILD_JOBS=1
          export FLOWRT_CACHE_DIR="$GITHUB_WORKSPACE/.flowrt-cache/v090-island-${{ matrix.arch }}"
          export FLOWRT_SMOKE_TARGET_PLATFORM="linux-${{ matrix.arch }}"
          scripts/test-v090-island-demo.sh

  v091-island-tooling-smoke:
    name: v0.9.1 Island Migration Tooling Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: v0.9.1 island CLI focused tests
        run: |
          cargo test -p flowrt-cli params_set_file -j1
          cargo test -p flowrt-cli pub_ -j1
          cargo test -p flowrt-cli echo_multiple_channels -j1
          cargo test -p flowrt-rsdl empty -j1
          cargo test -p flowrt-ir empty -j1
          cargo test -p flowrt-validate empty -j1
          cargo test -p flowrt-codegen empty -j1

      - name: 缓存 FlowRT v0.9.1 island deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache/v091-island-${{ matrix.arch }}
          key: flowrt-v091-island-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/test-v091-variable-frame-island-demo.sh', 'examples/variable_frame_island_demo/**') }}

      - name: v0.9.1 variable frame island demo smoke
        run: |
          export CARGO_BUILD_JOBS=1
          export FLOWRT_CACHE_DIR="$GITHUB_WORKSPACE/.flowrt-cache/v091-island-${{ matrix.arch }}"
          export FLOWRT_SMOKE_TARGET_PLATFORM="linux-${{ matrix.arch }}"
          scripts/test-v091-variable-frame-island-demo.sh

  v092-island-offline-validation-smoke:
    name: v0.9.2 Island Offline Validation Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: v0.9.2 island offline validation focused tests
        run: |
          cargo test -p flowrt-cli check -j1
          cargo test -p flowrt-cli replay -j1
          cargo test -p flowrt-cli echo -j1
          cargo test -p flowrt-cli cargo_internal_names_include_contract_hash_without_changing_public_names -j1
          cargo test -p flowrt-codegen island -j1

      - name: 缓存 FlowRT v0.9.2 island deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache/v092-island-${{ matrix.arch }}
          key: flowrt-v092-island-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'crates/flowrt-cli/src/main.rs', 'scripts/test-v092-island-replay-demo.sh') }}

      - name: v0.9.2 island replay demo smoke
        run: |
          export CARGO_BUILD_JOBS=1
          export FLOWRT_CACHE_DIR="$GITHUB_WORKSPACE/.flowrt-cache/v092-island-${{ matrix.arch }}"
          export FLOWRT_SMOKE_TARGET_PLATFORM="linux-${{ matrix.arch }}"
          scripts/test-v092-island-replay-demo.sh

  v083-toolchain-smoke:
    name: v0.8.3 Cross Toolchain Smoke
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装系统交叉编译工具
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            ninja-build \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            dpkg-dev

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-amd64-cross
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: 准备 linux-arm64 Rust target 和本机工具链
        shell: bash
        run: |
          set -euo pipefail
          rustup target add aarch64-unknown-linux-gnu
          rustup target list --installed | grep -Fx aarch64-unknown-linux-gnu
          command -v aarch64-linux-gnu-gcc
          command -v aarch64-linux-gnu-g++
          command -v pkg-config
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-g++ --version
          pkg-config --version

      - name: v0.8.3 flowrt deps/build --target focused tests
        run: |
          cargo test -p flowrt-cli toolchain_tests -j1
          cargo test -p flowrt-cli build_runtime_tests -j1
          cargo test -p flowrt-cli command_tests -j1
          cargo test -p flowrt-cli cmake_ -j1

  cpp-zenoh-runtime:
    name: C++ Zenoh Runtime (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            runner: ubuntu-latest
            artifact: flowrt-linux-amd64-deb
          - deb_arch: arm64
            runner: ubuntu-24.04-arm
            artifact: flowrt-linux-arm64-deb
    container:
      image: ros:jazzy-ros-base-noble
    needs:
      - package

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 下载 deb artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ dpkg-dev curl git

      - name: 安装 flowrt deb
        shell: bash
        run: |
          set -euo pipefail
          dpkg -i dist/flowrt_*_*.deb
          version="$(dpkg-deb -f dist/flowrt_*_*.deb Version)"
          {
            echo "FLOWRT_PRIVATE_PREFIX=/opt/flowrt/${version}"
            echo "CMAKE_PREFIX_PATH=/opt/flowrt/${version}"
            echo "LD_LIBRARY_PATH=/opt/flowrt/${version}/lib"
          } >> "$GITHUB_ENV"

      - name: C++ runtime zenoh 测试
        run: |
          cmake -S runtime/cpp -B build/cpp-zenoh -G Ninja -DFLOWRT_CPP_ENABLE_ZENOH_TESTS=ON
          cmake --build build/cpp-zenoh -j1
          ctest --test-dir build/cpp-zenoh --output-on-failure

  package:
    name: Debian Package (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            runner: ubuntu-latest
            artifact: flowrt-linux-amd64-deb
          - deb_arch: arm64
            runner: ubuntu-24.04-arm
            artifact: flowrt-linux-arm64-deb
    container:
      image: ros:jazzy-ros-base-noble
    needs:
      - guard-generated
      - rust-test
      - cpp-runtime
      - v050-runtime-smoke
      - v060-runtime-smoke
      - v070-runtime-smoke
      - v080-runtime-smoke
      - v081-runtime-smoke
      - v090-island-smoke
      - v091-island-tooling-smoke
      - v092-island-offline-validation-smoke
      - v083-toolchain-smoke

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ dpkg-dev curl git pkg-config file binutils

      - name: 安装 amd64 打包所需 arm64 交叉工具链
        if: matrix.deb_arch == 'amd64'
        run: apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 准备 package target Rust std
        if: matrix.deb_arch == 'amd64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.deb_arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: 构建并安装 flowrt deb
        shell: bash
        run: |
          scripts/package-deb.sh --output-dir dist --architecture "${{ matrix.deb_arch }}"
          dpkg -i dist/flowrt_*_*.deb
          version="$(dpkg-deb -f dist/flowrt_*_*.deb Version)"
          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          case "${{ matrix.deb_arch }}" in
            amd64) platform=linux-amd64; other_platform=linux-arm64 ;;
            arm64) platform=linux-arm64; other_platform=linux-amd64 ;;
            *) echo "unsupported deb_arch: ${{ matrix.deb_arch }}" >&2; exit 1 ;;
          esac
          test -x /usr/bin/flowrt
          test -f "/opt/flowrt/${version}/share/flowrt/runtime/rust/Cargo.toml"
          test -f "/opt/flowrt/${version}/share/flowrt/runtime/rust/src/lib.rs"
          test -f "/opt/flowrt/${version}/share/flowrt/crates/flowrt-record/Cargo.toml"
          test -f "/opt/flowrt/${version}/share/flowrt/crates/flowrt-record/src/lib.rs"
          test -d "/opt/flowrt/${version}/share/cargo/vendor"
          test -f "/opt/flowrt/${version}/include/flowrt/runtime.hpp"
          test -f "/opt/flowrt/${version}/lib/${multiarch}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
          test -f "/opt/flowrt/${version}/lib/${multiarch}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
          test -f "/opt/flowrt/${version}/lib/cmake/zenohcxx/zenohcxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/flowrt-target-sdk.toml"
          test -f "/opt/flowrt/${version}/targets/${platform}/include/flowrt/runtime.hpp"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/zenohc/zenohcConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/zenohcxx/zenohcxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/pkgconfig/zenohc.pc"
          test -f "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          grep -q 'complete = true' "/opt/flowrt/${version}/targets/${platform}/flowrt-target-sdk.toml"
          if [[ "${{ matrix.deb_arch }}" == "amd64" ]]; then
            test -f "/opt/flowrt/${version}/targets/${other_platform}/include/flowrt/runtime.hpp"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/lib/aarch64-linux-gnu/libiceoryx2_cxx.a"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/zenohc/zenohcConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/pkgconfig/zenohc.pc"
            grep -q 'complete = true' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
            grep -q 'host_mirror = false' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
            grep -q 'reason = "cross-target-sdk"' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          else
            grep -q 'complete = false' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          fi
          command -v flowrt
          flowrt --version
          scripts/test-deb-target-sdk-layout.sh dist/flowrt_*_*.deb

      - name: 缓存 FlowRT deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache
          key: flowrt-deps-package-${{ matrix.deb_arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/package-deb.sh', 'scripts/test-deb-installed-user-project.sh') }}

      - name: flowrt deb 用户项目 smoke
        run: |
          export FLOWRT_CACHE_DIR="${FLOWRT_CACHE_DIR:-$GITHUB_WORKSPACE/.flowrt-cache/package-${{ matrix.deb_arch }}}"
          scripts/test-deb-installed-user-project.sh

      - name: 上传 flowrt Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/flowrt_*_*.deb
          if-no-files-found: error

