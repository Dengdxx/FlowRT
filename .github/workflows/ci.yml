  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - guard-generated
      - rust-fmt
      - rust-test
      - rust-clippy
      - cpp-runtime
      - v050-runtime-smoke
      - v060-runtime-smoke
      - v070-runtime-smoke
      - v080-runtime-smoke
      - v081-runtime-smoke
      - v090-island-smoke
      - v091-island-tooling-smoke
      - v092-island-offline-validation-smoke
      - v083-toolchain-smoke
      - cpp-zenoh-runtime
      - package
      - v083-cross-compile-smoke
      - v086-cross-sdk-smoke
      - demo-smoke
      - ros2-jazzy-bridge
      - ros2-lyrical-bridge
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 下载 amd64 deb artifact
        uses: actions/download-artifact@v7
        with:
          name: flowrt-linux-amd64-deb
          path: dist

      - name: 下载 arm64 deb artifact
        uses: actions/download-artifact@v7
        with:
          name: flowrt-linux-arm64-deb
          path: dist

      - name: 准备 release 说明和校验和
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # 校验根 Cargo.toml
          cargo_version="$(
            awk '
              $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3);
                print $3;
                exit;
              }
            ' Cargo.toml
          )"
          if [[ "$version" != "$cargo_version" ]]; then
            printf 'tag version %s does not match Cargo.toml version %s\n' "$version" "$cargo_version" >&2
            exit 1
          fi

          # 校验 runtime/rust/Cargo.toml
          rust_runtime_version="$(
            awk '
              $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3);
                print $3;
                exit;
              }
            ' runtime/rust/Cargo.toml
          )"
          if [[ "$version" != "$rust_runtime_version" ]]; then
            printf 'tag version %s does not match runtime/rust/Cargo.toml version %s\n' "$version" "$rust_runtime_version" >&2
            exit 1
          fi

          # 校验 runtime/cpp/CMakeLists.txt
          cpp_version="$(
            grep -oP '(?<=FLOWRT_RUNTIME_CPP_VERSION ")[0-9]+\.[0-9]+\.[0-9]+' runtime/cpp/CMakeLists.txt
          )"
          if [[ "$version" != "$cpp_version" ]]; then
            printf 'tag version %s does not match runtime/cpp/CMakeLists.txt version %s\n' "$version" "$cpp_version" >&2
            exit 1
          fi

          # 校验 Cargo.lock 中所有本仓库 flowrt* package
          cargo_lock_mismatches="$(
            awk -v expected="$version" '
              /^\[\[package\]\]/ {
                name = "";
                next;
              }
              /^name = "/ {
                name = $3;
                gsub(/"/, "", name);
                next;
              }
              /^version = "/ {
                package_version = $3;
                gsub(/"/, "", package_version);
                if (name ~ /^flowrt/ && package_version != expected) {
                  printf "%s=%s\n", name, package_version;
                }
              }
            ' Cargo.lock
          )"
          if [[ -n "$cargo_lock_mismatches" ]]; then
            printf 'tag version %s does not match Cargo.lock flowrt* packages:\n%s\n' "$version" "$cargo_lock_mismatches" >&2
            exit 1
          fi

          scripts/extract-release-notes.sh "$tag" CHANGELOG.md > dist/release-notes.md

          # 校验 release notes 非空
          if [[ ! -s dist/release-notes.md ]]; then
            printf 'release notes for %s are empty\n' "$tag" >&2
            exit 1
          fi

          (cd dist && sha256sum flowrt_*_*.deb > SHA256SUMS)

          # 校验 SHA256SUMS 非空
          if [[ ! -s dist/SHA256SUMS ]]; then
            printf 'SHA256SUMS is empty — no deb packages found\n' >&2
            exit 1
          fi

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/flowrt_*_*.deb
            dist/SHA256SUMS
          fail_on_unmatched_files: true
