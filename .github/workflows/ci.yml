  demo-smoke:
    name: Demo Smoke (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            runner: ubuntu-latest
            artifact: flowrt-linux-amd64-deb
          - deb_arch: arm64
            runner: ubuntu-24.04-arm
            artifact: flowrt-linux-arm64-deb
    container:
      image: ros:jazzy-ros-base-noble
    needs:
      - package
      - cpp-zenoh-runtime

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 下载 deb artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ dpkg-dev curl git

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 准备 amd64 demo cross 工具链
        if: matrix.deb_arch == 'amd64'
        run: |
          apt-get update
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu file
          rustup target add aarch64-unknown-linux-gnu

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.deb_arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: 安装 flowrt deb
        shell: bash
        run: |
          dpkg -i dist/flowrt_*_*.deb
          version="$(dpkg-deb -f dist/flowrt_*_*.deb Version)"
          {
            echo "FLOWRT_PRIVATE_PREFIX=/opt/flowrt/${version}"
            echo "LD_LIBRARY_PATH=/opt/flowrt/${version}/lib"
          } >> "$GITHUB_ENV"
          flowrt --version

      - name: 缓存 FlowRT deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache
          key: flowrt-deps-demo-${{ matrix.deb_arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/test-v060-installed-smoke.sh', 'scripts/test-v070-installed-smoke.sh', 'scripts/test-v080-installed-smoke.sh', 'scripts/test-v081-installed-smoke.sh', 'scripts/test-v083-installed-smoke.sh') }}
          restore-keys: |
            flowrt-deps-demo-${{ matrix.deb_arch }}-

      - name: FlowRT demo smoke
        shell: bash
        run: |
          export FLOWRT_CACHE_DIR="${FLOWRT_CACHE_DIR:-$GITHUB_WORKSPACE/.flowrt-cache/demo-${{ matrix.deb_arch }}}"
          case "$(dpkg --print-architecture)" in
            amd64) flowrt_platform="linux-amd64" ;;
            arm64) flowrt_platform="linux-arm64" ;;
            *)
              echo "unsupported demo smoke architecture: $(dpkg --print-architecture)" >&2
              exit 1
              ;;
          esac
          find examples -path '*/rsdl/*' -type f -name '*.rsdl' -print0 |
            xargs -0 sed -i -E \
              "s/platform = \"linux-(amd64|arm64)\"/platform = \"$flowrt_platform\"/g"
          flowrt deps --backend all --build-mode release
          flowrt build --launcher examples/cpp_counter_demo/rsdl/robot.rsdl
          flowrt run --run-steps 5 examples/cpp_counter_demo/rsdl/robot.rsdl --process control
          flowrt launch --run-steps 5 examples/cpp_counter_demo/rsdl/robot.rsdl
          flowrt build examples/imu_demo/rsdl/robot.rsdl
          flowrt build --launcher examples/import_demo/rsdl/robot.rsdl
          flowrt run --run-steps 5 examples/import_demo/rsdl/robot.rsdl --process main
          flowrt launch --run-steps 5 examples/import_demo/rsdl/robot.rsdl
          flowrt check examples/mixed_iox2_demo/rsdl/robot.rsdl
          flowrt check examples/imu_demo_iox2/rsdl/robot.rsdl
          flowrt check examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt build --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt run --run-steps 5 --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt build --launcher examples/mixed_zenoh_demo/rsdl/robot.rsdl
          FLOWRT_TICK_SLEEP_MS=5 flowrt launch --run-steps 200 examples/mixed_zenoh_demo/rsdl/robot.rsdl
          scripts/test-v060-installed-smoke.sh
          scripts/test-v070-installed-smoke.sh
          scripts/test-v080-installed-smoke.sh
          scripts/test-v081-installed-smoke.sh
          scripts/test-v083-installed-smoke.sh

