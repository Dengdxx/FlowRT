name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Linux CI
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/project-layout.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

      - name: 安装系统构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 确认工具链版本
        run: |
          rustc --version
          cargo --version
          cmake --version
          ninja --version
          g++ --version

      - name: Rust 格式检查
        run: cargo fmt --check

      - name: Rust 测试
        run: cargo test

      - name: Rust Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: C++ runtime 配置
        run: cmake -S runtime/cpp -B build/cpp -G Ninja

      - name: C++ runtime 构建
        run: cmake --build build/cpp

      - name: C++ runtime 测试
        run: ctest --test-dir build/cpp --output-on-failure

      - name: FlowRT demo smoke
        env:
          FLOWRT_RUN_TICKS: "5"
        run: |
          cargo run -p flowrt-cli -- build examples/cpp_counter_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run examples/cpp_counter_demo/rsdl/robot.rsdl --process control
          cargo run -p flowrt-cli -- launch examples/cpp_counter_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- build examples/imu_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run examples/import_demo/rsdl/robot.rsdl --process main
          cargo run -p flowrt-cli -- launch examples/import_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/mixed_iox2_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/imu_demo_iox2/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- check examples/profile_switch_demo/rsdl/robot.rsdl
          cargo run -p flowrt-cli -- run --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl

      - name: 构建 release 版 flowrt
        run: cargo build --release -p flowrt-cli

      - name: 上传 flowrt Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowrt-linux-x86_64
          path: target/release/flowrt
          if-no-files-found: error
