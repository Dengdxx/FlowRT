name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Linux CI
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/project-layout.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

      - name: 安装系统构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 确认工具链版本
        run: |
          rustc --version
          cargo --version
          cmake --version
          ninja --version
          g++ --version

      - name: 安装 zenoh C++ backend 依赖
        shell: bash
        run: |
          set -euo pipefail

          FLOWRT_DEPS_ROOT="${RUNNER_TEMP}/flowrt-deps"
          FLOWRT_DEPS_PREFIX="${FLOWRT_DEPS_ROOT}/prefix"
          {
            echo "FLOWRT_DEPS_ROOT=${FLOWRT_DEPS_ROOT}"
            echo "FLOWRT_DEPS_PREFIX=${FLOWRT_DEPS_PREFIX}"
            echo "CMAKE_PREFIX_PATH=${FLOWRT_DEPS_PREFIX}"
            echo "LD_LIBRARY_PATH=${FLOWRT_DEPS_PREFIX}/lib"
          } >> "$GITHUB_ENV"

          cargo install cbindgen --locked
          mkdir -p "$FLOWRT_DEPS_ROOT/src" "$FLOWRT_DEPS_PREFIX"

          git clone --branch 1.9.0 --depth 1 https://github.com/eclipse-zenoh/zenoh-c.git "$FLOWRT_DEPS_ROOT/src/zenoh-c"
          cmake -S "$FLOWRT_DEPS_ROOT/src/zenoh-c" -B "$FLOWRT_DEPS_ROOT/build/zenoh-c" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$FLOWRT_DEPS_PREFIX" \
            -DBUILD_SHARED_LIBS=ON
          cmake --build "$FLOWRT_DEPS_ROOT/build/zenoh-c" --target install

          git clone --branch 1.9.0 --depth 1 https://github.com/eclipse-zenoh/zenoh-cpp.git "$FLOWRT_DEPS_ROOT/src/zenoh-cpp"
          cmake -S "$FLOWRT_DEPS_ROOT/src/zenoh-cpp" -B "$FLOWRT_DEPS_ROOT/build/zenoh-cpp" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$FLOWRT_DEPS_PREFIX" \
            -DCMAKE_PREFIX_PATH="$FLOWRT_DEPS_PREFIX" \
            -DZENOHCXX_ZENOHC=ON \
            -DZENOHCXX_ZENOHPICO=OFF \
            -DZENOHCXX_ENABLE_TESTS=OFF \
            -DZENOHCXX_ENABLE_EXAMPLES=OFF
          cmake --build "$FLOWRT_DEPS_ROOT/build/zenoh-cpp" --target install

      - name: Rust 格式检查
        run: cargo fmt --check

      - name: Rust 测试
        run: cargo test

      - name: Rust Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: C++ runtime 配置
        run: cmake -S runtime/cpp -B build/cpp -G Ninja

      - name: C++ runtime 构建
        run: cmake --build build/cpp

      - name: C++ runtime 测试
        run: ctest --test-dir build/cpp --output-on-failure

      - name: 系统安装 C++ runtime
        run: |
          sudo cmake --install build/cpp --prefix /usr/local
          test -f /usr/local/include/flowrt/runtime.hpp
          test -f /usr/local/lib/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake

      - name: C++ runtime zenoh 测试
        run: |
          cmake -S runtime/cpp -B build/cpp-zenoh -G Ninja -DFLOWRT_CPP_ENABLE_ZENOH_TESTS=ON
          cmake --build build/cpp-zenoh
          ctest --test-dir build/cpp-zenoh --output-on-failure

      - name: 构建并系统安装 flowrt
        run: |
          cargo build --release -p flowrt-cli
          sudo install -D -m 0755 target/release/flowrt /usr/local/bin/flowrt
          sudo rm -rf /usr/local/share/flowrt/runtime/rust
          sudo install -d /usr/local/share/flowrt/runtime/rust
          sudo cp -a runtime/rust/Cargo.toml runtime/rust/src /usr/local/share/flowrt/runtime/rust/
          test -f /usr/local/share/flowrt/runtime/rust/Cargo.toml
          test -f /usr/local/share/flowrt/runtime/rust/src/lib.rs
          command -v flowrt
          flowrt --version

      - name: FlowRT demo smoke
        run: |
          flowrt build --launcher examples/cpp_counter_demo/rsdl/robot.rsdl
          flowrt run --run-ticks 5 examples/cpp_counter_demo/rsdl/robot.rsdl --process control
          flowrt launch --run-ticks 5 examples/cpp_counter_demo/rsdl/robot.rsdl
          flowrt build examples/imu_demo/rsdl/robot.rsdl
          flowrt build --launcher examples/import_demo/rsdl/robot.rsdl
          flowrt run --run-ticks 5 examples/import_demo/rsdl/robot.rsdl --process main
          flowrt launch --run-ticks 5 examples/import_demo/rsdl/robot.rsdl
          flowrt check examples/mixed_iox2_demo/rsdl/robot.rsdl
          flowrt check examples/imu_demo_iox2/rsdl/robot.rsdl
          flowrt check examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt build --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt run --run-ticks 5 --profile iox2 examples/profile_switch_demo/rsdl/robot.rsdl
          flowrt build --launcher examples/variable_iox2_demo/rsdl/robot.rsdl
          rm -f /tmp/flowrt-variable-iox2-saw-packet
          FLOWRT_TICK_SLEEP_MS=5 FLOWRT_VARIABLE_IOX2_SAW_PACKET_PATH=/tmp/flowrt-variable-iox2-saw-packet \
            flowrt launch --run-ticks 200 examples/variable_iox2_demo/rsdl/robot.rsdl
          test -s /tmp/flowrt-variable-iox2-saw-packet
          flowrt build --launcher examples/mixed_zenoh_demo/rsdl/robot.rsdl
          FLOWRT_TICK_SLEEP_MS=5 flowrt launch --run-ticks 200 examples/mixed_zenoh_demo/rsdl/robot.rsdl

      - name: 上传 flowrt Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowrt-linux-x86_64
          path: target/release/flowrt
          if-no-files-found: error
