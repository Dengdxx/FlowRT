  rust-fmt:
    name: Rust Fmt (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: Rust 格式检查
        run: cargo fmt --check

