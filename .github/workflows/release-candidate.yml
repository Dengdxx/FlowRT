        shell: bash
        run: |
          set -euo pipefail

          ref_version="${GITHUB_REF_NAME##*/}"
          version="${ref_version#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'release evidence requires dev/vX.Y.Z branch, got %s\n' "$GITHUB_REF_NAME" >&2
            exit 1
          fi
          tag="v${version}"

          scripts/check-release-readiness.sh "$version"
          scripts/extract-release-notes.sh "$tag" CHANGELOG.md > dist/release-notes.md
          if [[ ! -s dist/release-notes.md ]]; then
            printf 'release notes for %s are empty\n' "$tag" >&2
            exit 1
          fi

          mapfile -t debs < <(find dist -maxdepth 1 -type f -name 'flowrt_*_*.deb' | sort)
          if [[ "${#debs[@]}" -ne 2 ]]; then
            printf 'release evidence expected 2 deb artifacts, found %s\n' "${#debs[@]}" >&2
            printf '%s\n' "${debs[@]}" >&2
            exit 1
          fi

          found_amd64=0
          found_arm64=0
          for deb in "${debs[@]}"; do
            deb_version="$(dpkg-deb -f "$deb" Version)"
            deb_arch="$(dpkg-deb -f "$deb" Architecture)"
            if [[ "$deb_version" != "$version" ]]; then
              printf '%s version %s does not match expected %s\n' "$deb" "$deb_version" "$version" >&2
              exit 1
            fi
            case "$deb_arch" in
              amd64) found_amd64=1 ;;
              arm64) found_arm64=1 ;;
              *)
                printf '%s has unexpected architecture %s\n' "$deb" "$deb_arch" >&2
                exit 1
                ;;
            esac
          done

          if [[ "$found_amd64" -ne 1 || "$found_arm64" -ne 1 ]]; then
            printf 'release evidence artifacts must include amd64 and arm64 deb packages\n' >&2
            exit 1
          fi

          (cd dist && sha256sum flowrt_*_*.deb > SHA256SUMS)
          if [[ ! -s dist/SHA256SUMS ]]; then
            printf 'SHA256SUMS is empty\n' >&2
            exit 1
          fi

          cat > dist/release-evidence.json <<EOF
          {
            "version": "$version",
            "tag": "$tag",
            "sha": "$GITHUB_SHA",
            "run_id": "$GITHUB_RUN_ID",
            "workflow": "release-candidate.yml",
            "job": "Release Evidence Gate",
            "artifacts": [
              "flowrt-linux-amd64-deb",
              "flowrt-linux-arm64-deb"
            ]
          }
          EOF

          printf 'release evidence passed: version=%s sha=%s run_id=%s\n' \
            "$version" "$GITHUB_SHA" "$GITHUB_RUN_ID"

      - name: 上传 release evidence
        uses: actions/upload-artifact@v7
        with:
          name: flowrt-release-evidence
          path: |
            dist/release-evidence.json
            dist/release-notes.md
            dist/SHA256SUMS
          if-no-files-found: error
