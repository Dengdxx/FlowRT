          {
            echo "FLOWRT_PRIVATE_PREFIX=/opt/flowrt/${version}"
            echo "LD_LIBRARY_PATH=/opt/flowrt/${version}/lib"
          } >> "$GITHUB_ENV"
          flowrt --version

      - name: 缓存 FlowRT deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache
          key: flowrt-deps-demo-${{ matrix.deb_arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/test-v060-installed-smoke.sh', 'scripts/test-v070-installed-smoke.sh', 'scripts/test-v080-installed-smoke.sh', 'scripts/test-v081-installed-smoke.sh', 'scripts/test-v083-installed-smoke.sh') }}
          restore-keys: |
            flowrt-deps-demo-${{ matrix.deb_arch }}-

