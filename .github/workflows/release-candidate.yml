name: Release Candidate

on:
  push:
    branches:
      - "dev/v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  guard-generated:
    name: Guard Generated Files
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base-noble

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 确认忽略产物未入库
        shell: bash
        run: |
          set -euo pipefail

          tracked=$(
            git -c safe.directory="$GITHUB_WORKSPACE" ls-files -- \
              docs/architecture-plan.md \
              docs/backend-contract.md \
              docs/contract-ir-v0.1.md \
              docs/message-abi-v0.1.md \
              docs/rsdl-v0.1.md \
              'flowrt/**' \
              'examples/*/flowrt/**'
          )

          if [[ -n "$tracked" ]]; then
            echo "以下本地规格或 FlowRT 生成物已被 git tracked，必须移出索引："
            echo "$tracked"
            exit 1
          fi

          echo "未发现被 tracked 的本地规格或 FlowRT 生成物。"

  v0141-architecture-smoke:
    name: v0.14.1 Architecture Guard
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: v0.14.1 architecture guard
        shell: bash
        run: |
          bash -n scripts/check-architecture-size.sh scripts/test-v0141-architecture-smoke.sh
          scripts/test-v0141-architecture-smoke.sh

  v0150-architecture-convergence-smoke:
    name: v0.15.0 Architecture Convergence Smoke
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 architecture guard 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: v0.15.0 architecture convergence smoke
        shell: bash
        run: |
          set -euo pipefail

          focused_smoke="$(cargo run -p flowrt-devtools -- release-gate focused-smoke 0.15.0)"
          bash -n "$focused_smoke"
          "$focused_smoke"

