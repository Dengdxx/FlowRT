  package:
    name: Debian Package (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            runner: ubuntu-latest
            artifact: flowrt-linux-amd64-deb
          - deb_arch: arm64
            runner: ubuntu-24.04-arm
            artifact: flowrt-linux-arm64-deb
    container:
      image: ros:jazzy-ros-base-noble
    needs:
      - guard-generated
      - v0141-architecture-smoke
      - v0150-architecture-convergence-smoke
      - v0151-ci-release-evidence-smoke
      - v0152-scheduler-clock-smoke
      - v0160-clock-model-smoke
      - v0170-deterministic-replay-smoke
      - v0171-cpp-replay-parity-smoke
      - rust-test
      - cpp-runtime
      - v050-runtime-smoke
      - v060-runtime-smoke
      - v070-runtime-smoke
      - v080-runtime-smoke
      - v081-runtime-smoke
      - v090-island-smoke
      - v091-island-tooling-smoke
      - v092-island-offline-validation-smoke
      - v0102-concurrency-smoke
      - v0120-authoring-smoke
      - v0130-runtime-completion-smoke
      - v0140-realtime-scheduler-smoke
      - v0232-cpp-clang-tidy-smoke
      - v0233-scope-closure-smoke
      - v0250-iox2-service-operation-smoke
      - v0251-transport-evidence-smoke
      - v0252-transport-route-health-smoke
      - v0260-transport-compile-evidence-smoke
      - v0270-operation-control-plane-smoke
      - v0271-debt-closure-smoke
      - v0280-module-app-layout-smoke
      - v0290-example-module-layout-smoke
      - v083-toolchain-smoke

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装系统构建工具
        run: |
          apt-get update
          apt-get install -y cmake ninja-build g++ dpkg-dev curl git pkg-config file binutils

      - name: 安装 amd64 打包所需 arm64 交叉工具链
        if: matrix.deb_arch == 'amd64'
        run: apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 准备 package target Rust std
        if: matrix.deb_arch == 'amd64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: 缓存 Rust 构建产物
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: flowrt-${{ matrix.deb_arch }}
          shared-key: ${{ github.job }}
          cache-on-failure: true

      - name: 构建并安装 flowrt deb
        shell: bash
        run: |
          scripts/package-deb.sh --output-dir dist --architecture "${{ matrix.deb_arch }}"
          dpkg -i dist/flowrt_*_*.deb
          version="$(dpkg-deb -f dist/flowrt_*_*.deb Version)"
          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          case "${{ matrix.deb_arch }}" in
            amd64) platform=linux-amd64; other_platform=linux-arm64 ;;
            arm64) platform=linux-arm64; other_platform=linux-amd64 ;;
            *) echo "unsupported deb_arch: ${{ matrix.deb_arch }}" >&2; exit 1 ;;
          esac
          test -x /usr/bin/flowrt
          test -f "/opt/flowrt/${version}/share/flowrt/runtime/rust/Cargo.toml"
          test -f "/opt/flowrt/${version}/share/flowrt/runtime/rust/src/lib.rs"
          test -f "/opt/flowrt/${version}/share/flowrt/crates/flowrt-record/Cargo.toml"
          test -f "/opt/flowrt/${version}/share/flowrt/crates/flowrt-record/src/lib.rs"
          test -d "/opt/flowrt/${version}/share/cargo/vendor"
          test -f "/opt/flowrt/${version}/include/flowrt/runtime.hpp"
          test -f "/opt/flowrt/${version}/lib/${multiarch}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
          test -f "/opt/flowrt/${version}/lib/${multiarch}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
          test -f "/opt/flowrt/${version}/lib/cmake/zenohcxx/zenohcxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/flowrt-target-sdk.toml"
          test -f "/opt/flowrt/${version}/targets/${platform}/include/flowrt/runtime.hpp"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/zenohc/zenohcConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/cmake/zenohcxx/zenohcxxConfig.cmake"
          test -f "/opt/flowrt/${version}/targets/${platform}/pkgconfig/zenohc.pc"
          test -f "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          grep -q 'complete = true' "/opt/flowrt/${version}/targets/${platform}/flowrt-target-sdk.toml"
          if [[ "${{ matrix.deb_arch }}" == "amd64" ]]; then
            test -f "/opt/flowrt/${version}/targets/${other_platform}/include/flowrt/runtime.hpp"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/lib/aarch64-linux-gnu/libiceoryx2_cxx.a"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/flowrt_runtime/flowrt_runtimeConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/iceoryx2-cxx/iceoryx2-cxxConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/cmake/zenohc/zenohcConfig.cmake"
            test -f "/opt/flowrt/${version}/targets/${other_platform}/pkgconfig/zenohc.pc"
            grep -q 'complete = true' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
            grep -q 'host_mirror = false' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
            grep -q 'reason = "cross-target-sdk"' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          else
            grep -q 'complete = false' "/opt/flowrt/${version}/targets/${other_platform}/flowrt-target-sdk.toml"
          fi
          command -v flowrt
          flowrt --version
          scripts/test-deb-target-sdk-layout.sh dist/flowrt_*_*.deb

      - name: 缓存 FlowRT deps
        uses: actions/cache@v4
        with:
          path: .flowrt-cache
          key: flowrt-deps-package-${{ matrix.deb_arch }}-${{ hashFiles('Cargo.lock', 'runtime/rust/Cargo.toml', 'crates/flowrt-cli/src/build_model.rs', 'scripts/package-deb.sh', 'scripts/test-deb-installed-user-project.sh') }}

      - name: flowrt deb 用户项目 smoke
        run: |
          export FLOWRT_CACHE_DIR="${FLOWRT_CACHE_DIR:-$GITHUB_WORKSPACE/.flowrt-cache/package-${{ matrix.deb_arch }}}"
          scripts/test-deb-installed-user-project.sh

      - name: 上传 flowrt Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/flowrt_*_*.deb
          if-no-files-found: error

