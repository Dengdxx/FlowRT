# FlowRT 管理产物。不要手工修改。
[package]
name = "service-iox2-dynamic-fallback-flowrt-app"
version = "0.1.0"
edition = "2024"

[workspace]

[lib]
name = "flowrt_app"
path = "../rust/src/lib.rs"

[dependencies]
flowrt = { version = "0.28", features = ["iox2", "zenoh"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "service-iox2-dynamic-fallback-flowrt-app"
path = "../rust/src/main.rs"

[[bin]]
name = "service-iox2-dynamic-fallback-flowrt-supervisor"
path = "../rust/src/supervisor_main.rs"

[[test]]
name = "message_frame"
path = "../rust/tests/message_frame.rs"
