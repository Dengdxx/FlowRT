# FlowRT 管理产物。不要手工修改。
[package]
name = "island-sensor-rust-demo-flowrt-app"
version = "0.1.0"
edition = "2024"

[workspace]

[lib]
name = "flowrt_app"
path = "../rust/src/lib.rs"

[dependencies]
flowrt = { version = "0.23" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "island-sensor-rust-demo-flowrt-app"
path = "../rust/src/main.rs"

[[bin]]
name = "island-sensor-rust-demo-flowrt-supervisor"
path = "../rust/src/supervisor_main.rs"

[[test]]
name = "message_abi"
path = "../rust/tests/message_abi.rs"
