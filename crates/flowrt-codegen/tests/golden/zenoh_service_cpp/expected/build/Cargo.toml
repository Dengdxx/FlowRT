# FlowRT 管理产物。不要手工修改。
[package]
name = "zenoh-service-cpp-flowrt-app"
version = "0.1.0"
edition = "2024"

[workspace]

[lib]
name = "flowrt_app"
path = "../rust/src/lib.rs"

[dependencies]
flowrt = { version = "0.28" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "zenoh-service-cpp-flowrt-supervisor"
path = "../rust/src/supervisor_main.rs"
